{{- $image := "" -}}
{{- $featured := .Resources.GetMatch "featured*" -}}
{{- if $featured -}}
  {{- $image = $featured.Permalink -}}
{{- end -}}

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BlogPosting",
  "mainEntityOfPage": {
    "@type": "WebPage",
    "@id": {{ .Permalink | jsonify }}
  },
  "headline": {{ .Title | jsonify }},
  {{- with $image }}
  "image": {{ . | jsonify }},
  {{- end }}
  "datePublished": {{ .Date.Format "2006-01-02T15:04:05Z07:00" | jsonify }},
  "dateModified": {{ .Lastmod.Format "2006-01-02T15:04:05Z07:00" | jsonify }},
  "author": {
    "@type": "Person",
    "name": "Daniel Diaz"
  },
  "publisher": {
    "@type": "Person",
    "name": "Daniel Diaz"
  },
  "description": {{ (.Params.summary | default (.Summary | plainify | truncate 160)) | jsonify }}
}
</script>
